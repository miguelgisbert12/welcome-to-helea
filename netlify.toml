[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/media/videos/*"
  [headers.values]
  Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"